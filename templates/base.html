<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Insighta Labs+{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans leading-normal tracking-normal">
    {% if user %}
    <nav class="bg-white border-b border-gray-200 fixed w-full z-30 top-0">
        <div class="px-3 py-3 lg:px-5 lg:pl-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <a href="/dashboard" class="text-xl font-bold flex items-center lg:ml-2.5">
                        <span class="self-center whitespace-nowrap text-blue-600">Insighta Labs+</span>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/dashboard" class="text-gray-600 hover:text-blue-600">Dashboard</a>
                    <a href="/web/profiles" class="text-gray-600 hover:text-blue-600">Profiles</a>
                    <a href="/web/account" class="flex items-center text-sm font-medium text-gray-900 rounded-full hover:text-blue-600">
                        <img class="w-8 h-8 mr-2 rounded-full" src="{{ user.avatar_url or 'https://ui-avatars.com/api/?name=' + user.username }}" alt="user photo">
                        {{ user.username }}
                    </a>
                </div>
            </div>
        </div>
    </nav>
    <div class="pt-20">
    {% endif %}

        <main class="p-6">
            {% block content %}{% endblock %}
        </main>

    {% if user %}
    </div>
    {% endif %}

    <script src="/static/js/api.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
